<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aun Mustansar Hussain | Portfolio</title>

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="DSC_0810.JPG">
<link rel="apple-touch-icon" href="DSC_0810.JPG">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f2f;
color:white;
}

/* Cursor Glow */
.cursor{
position:fixed;
width:250px;
height:250px;
background:radial-gradient(circle,#7b61ff33,transparent 70%);
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
}

/* Navbar */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

/* Hero */
.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:80px 40px;
}

.hero img{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
border:3px solid #7b61ff;
}

.btn{
background:#7b61ff;
padding:10px 20px;
border-radius:20px;
color:white;
text-decoration:none;
}

/* Skills */
.skills{padding:60px;}

.skill{margin:15px 0;}

.bar{
height:10px;
background:#222;
border-radius:10px;
}

.progress{
height:10px;
background:#7b61ff;
width:0;
border-radius:10px;
transition:1s;
}

/* Projects */
.projects{padding:60px;}

.repo{
background:#111;
padding:15px;
margin:10px 0;
border-radius:10px;
}

.repo a{
color:#7b61ff;
}

/* Contact */
.contact{
padding:60px;
}

.contact a{
display:inline-block;
margin:10px;
font-size:20px;
color:white;
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<!-- NAV -->
<nav>
<h3>Aun Mustansar</h3>
<div>
<a href="#">Home</a>
<a href="#skills">Skills</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1>Hi I'm Aun Mustansar</h1>
<p>AI Engineer | Data Scientist</p>
<a href="cv.pdf" class="btn" download>Download CV</a>
</div>
<img src="DSC_0810.JPG">
</section>

<!-- SKILLS -->
<section class="skills" id="skills">
<h2>Skills</h2>

<div class="skill">Python<div class="bar"><div class="progress" data="90%"></div></div></div>
<div class="skill">Machine Learning<div class="bar"><div class="progress" data="85%"></div></div></div>
<div class="skill">Deep Learning<div class="bar"><div class="progress" data="80%"></div></div></div>
<div class="skill">Computer Vision<div class="bar"><div class="progress" data="75%"></div></div></div>

</section>

<!-- PROJECTS -->
<section class="projects" id="projects">
<h2>GitHub Projects</h2>
<div id="repos"></div>
</section>

<!-- CONTACT -->
<section class="contact" id="contact">
<h2>Contact</h2>

<a href="mailto:aounmustansar@email.com"><i class="fas fa-envelope"></i></a>
<a href="tel:+923212514017"><i class="fas fa-phone"></i></a>
<a href="https://www.linkedin.com/in/aun-mustansar-hussain-71a793317" target="_blank"><i class="fab fa-linkedin"></i></a>
<a href="https://github.com/aun-bit" target="_blank"><i class="fab fa-github"></i></a>

</section>

<script>

// Cursor glow
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

// Skill animation
const bars=document.querySelectorAll(".progress");
window.addEventListener("scroll",()=>{
bars.forEach(bar=>{
bar.style.width=bar.getAttribute("data");
});
});

// GitHub fetch
fetch("https://api.github.com/users/aun-bit/repos")
.then(res=>res.json())
.then(data=>{
const container=document.getElementById("repos");
data.slice(0,5).forEach(repo=>{
container.innerHTML+=`
<div class="repo">
<h3>${repo.name}</h3>
<p>${repo.description||"No description"}</p>
<a href="${repo.html_url}" target="_blank">View Repo</a>
</div>`;
});
});

</script>

</body>
</html>
